<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NS Discovery Tours — Nature &amp; Conservation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:   #0a0a0a;
      --white:   #ffffff;
      --green:   #c8e6a0;
      --amber:   #ffcc66;
      --red:     #c0392b;
      --red-bg:  #fdf0ef;
      --grey-1:  #f5f5f5;
      --grey-3:  #d4d4d4;
      --grey-6:  #737373;
      --font:    -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --radius:  10px;
    }

    body {
      font-family: var(--font);
      background: var(--white);
      color: var(--black);
      padding: 0 24px 80px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .ns-header {
      border-bottom: 1px solid var(--grey-3);
      padding: 14px 0 16px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 28px;
    }
    .ns-header__logo { font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .ns-header__section { font-size: 13px; color: var(--grey-6); }
    .ns-header__nav { margin-left: auto; display: flex; gap: 20px; font-size: 12px; color: var(--grey-6); }

    /* ── Hero ── */
    .ns-hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
      margin-bottom: 3px;
      height: 360px;
    }

    .ns-hero__main {
      position: relative;
      overflow: hidden;
      background: #111;
      border-radius: var(--radius) 0 0 var(--radius);
    }

    .ns-hero__main img {
      width: 100%; height: 100%; object-fit: cover; opacity: 0.72; display: block;
    }

    .ns-hero__main-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 28px;
      background: linear-gradient(transparent, rgba(0,0,0,0.75));
    }

    .ns-hero__eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 6px;
    }

    .ns-hero__title {
      font-size: 22px;
      font-weight: 600;
      line-height: 1.2;
      color: #fff;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }

    .ns-hero__meta {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .ns-hero__avail {
      color: var(--amber);
      font-weight: 600;
    }

    .ns-hero__stack {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .ns-hero__secondary {
      position: relative;
      overflow: hidden;
      background: #111;
      flex: 1;
    }

    .ns-hero__secondary:last-child {
      border-radius: 0 0 var(--radius) 0;
    }

    .ns-hero__secondary:first-child {
      border-radius: 0 var(--radius) 0 0;
    }

    .ns-hero__secondary img {
      width: 100%; height: 100%; object-fit: cover; opacity: 0.65; display: block;
    }

    .ns-hero__secondary-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 14px 16px;
      background: linear-gradient(transparent, rgba(0,0,0,0.78));
    }

    .ns-hero__secondary-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
      color: #fff;
      margin-bottom: 4px;
    }

    .ns-hero__secondary-meta {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      display: flex;
      gap: 10px;
    }

    /* ── Section header ── */
    .ns-section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 22px 0 14px;
      border-bottom: 1px solid var(--grey-3);
      margin-bottom: 20px;
    }

    .ns-section-header h2 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--grey-6);
    }

    .ns-section-header__count {
      font-size: 11px;
      color: var(--grey-6);
    }

    .ns-filters {
      margin-left: auto;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .ns-filter {
      font-size: 11px;
      padding: 4px 12px;
      border: 1px solid var(--grey-3);
      border-radius: 20px;
      color: var(--grey-6);
      background: transparent;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.15s;
    }

    .ns-filter:hover { border-color: var(--black); color: var(--black); }

    .ns-filter.active {
      background: var(--black);
      color: var(--white);
      border-color: var(--black);
    }

    /* ── Card grid ── */
    .ns-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }

    .ns-card {
      border: 1px solid var(--grey-3);
      border-radius: var(--radius);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s;
    }

    .ns-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.1); }

    .ns-card__img {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
      display: block;
      background: var(--grey-1);
    }

    .ns-card__body {
      padding: 14px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .ns-card__type {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--grey-6);
      margin-bottom: 6px;
    }

    .ns-card__avail {
      font-size: 10px;
      font-weight: 600;
      color: var(--red);
      background: var(--red-bg);
      padding: 2px 8px;
      border-radius: 3px;
      display: inline-block;
      margin-bottom: 6px;
    }

    .ns-card__title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.35;
      letter-spacing: -0.01em;
      margin-bottom: 12px;
      flex: 1;
    }

    .ns-card__footer {
      display: flex;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 1px solid var(--grey-1);
      font-size: 11px;
      color: var(--grey-6);
    }

    .ns-card__footer strong {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--black);
    }

    /* ── Wide cards ── */
    .ns-wide-card {
      display: grid;
      grid-template-columns: 200px 1fr;
      border: 1px solid var(--grey-3);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 12px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.2s;
    }

    .ns-wide-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.1); }

    .ns-wide-card__img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      background: var(--grey-1);
      min-height: 120px;
    }

    .ns-wide-card__body {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .ns-wide-card__type {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--grey-6);
      margin-bottom: 4px;
    }

    .ns-wide-card__title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }

    .ns-wide-card__footer {
      display: flex;
      gap: 24px;
      font-size: 11px;
      color: var(--grey-6);
      padding-top: 10px;
      border-top: 1px solid var(--grey-1);
    }

    .ns-wide-card__footer strong {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--black);
    }

    /* ── States ── */
    .ns-state {
      padding: 60px 0;
      text-align: center;
      color: var(--grey-6);
      font-size: 14px;
    }

    .ns-freshness {
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 12px;
      color: #5d4037;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="ns-header">
    <span class="ns-header__logo">New Scientist</span>
    <span class="ns-header__section">Discovery Tours — Nature &amp; conservation</span>
    <div class="ns-header__nav">
      <span>Marine</span>
      <span>Geology</span>
      <span>History</span>
      <span>Astronomy</span>
    </div>
  </div>

  <div class="ns-freshness" id="freshnessWarning">
    ⚠️ Tour data may be outdated — last updated more than 3 hours ago.
  </div>

  <!-- Hero — populated by JS -->
  <div id="heroContainer"></div>

  <!-- All tours section -->
  <div class="ns-section-header">
    <h2>All tours</h2>
    <span class="ns-section-header__count" id="toursCount"></span>
    <div class="ns-filters" id="filters">
      <button class="ns-filter active" data-type="all">All</button>
    </div>
  </div>

  <div id="gridContainer">
    <div class="ns-state">Loading tours...</div>
  </div>

  <!-- Departing soon section -->
  <div class="ns-section-header" id="soonHeader" style="display:none;">
    <h2>Departing soon</h2>
  </div>

  <div id="soonContainer"></div>

<script>
(function() {

  var SUPABASE_URL = 'https://udizygtdacdqjenvvjgb.supabase.co/rest/v1/tours';
  var ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkaXp5Z3RkYWNkcWplbnZ2amdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTExMDQsImV4cCI6MjA5NzcyNzEwNH0.tlnNpL9bM-tibMCIoEhgUUJnn8zrPXlK-WJCjE5ifxI';

  var allTours = [];
  var activeFilter = 'all';

  // ── Fetch all nature tours ──
  fetch(SUPABASE_URL + '?category=eq.nature&order=date.asc', {
    headers: {
      'apikey': ANON_KEY,
      'Authorization': 'Bearer ' + ANON_KEY
    }
  })
  .then(function(r) { return r.json(); })
  .then(function(tours) {
    allTours = tours;
    checkFreshness(tours);
    buildHero(tours);
    buildFilters(tours);
    renderGrid(tours);
    renderSoon(tours);
  })
  .catch(function() {
    document.getElementById('gridContainer').innerHTML =
      '<div class="ns-state">Unable to load tours. Please try again later.</div>';
  });

  // ── Freshness ──
  function checkFreshness(tours) {
    if (!tours.length) return;
    var age = (Date.now() - new Date(tours[0].last_scraped)) / 3600000;
    if (age > 3) document.getElementById('freshnessWarning').style.display = 'block';
  }

  // ── Hero — first tour is featured, next two fill the stack ──
  function buildHero(tours) {
    if (tours.length < 3) return;
    var featured = tours[0];
    var second = tours[1];
    var third = tours[2];

    document.getElementById('heroContainer').innerHTML = [
      '<div class="ns-hero">',
        '<a class="ns-hero__main" href="' + esc(featured.url) + '" target="_blank" rel="noopener">',
          '<img src="' + esc(featured.image_url) + '" alt="' + esc(featured.title) + '">',
          '<div class="ns-hero__main-overlay">',
            '<div class="ns-hero__eyebrow">Featured ' + esc(featured.type.toLowerCase()) + '</div>',
            '<div class="ns-hero__title">' + esc(featured.title) + '</div>',
            '<div class="ns-hero__meta">',
              '<span>' + esc(featured.duration) + '</span>',
              '<span>' + esc(featured.date) + '</span>',
              featured.availability ? '<span class="ns-hero__avail">' + esc(featured.availability) + '</span>' : '',
            '</div>',
          '</div>',
        '</a>',
        '<div class="ns-hero__stack">',
          heroSecondary(second),
          heroSecondary(third),
        '</div>',
      '</div>'
    ].join('');
  }

  function heroSecondary(tour) {
    return [
      '<a class="ns-hero__secondary" href="' + esc(tour.url) + '" target="_blank" rel="noopener">',
        '<img src="' + esc(tour.image_url) + '" alt="' + esc(tour.title) + '">',
        '<div class="ns-hero__secondary-overlay">',
          '<div class="ns-hero__secondary-title">' + esc(tour.title) + '</div>',
          '<div class="ns-hero__secondary-meta">',
            '<span>' + esc(tour.duration) + '</span>',
            '<span>' + esc(tour.date) + '</span>',
          '</div>',
        '</div>',
      '</a>'
    ].join('');
  }

  // ── Filters ──
  function buildFilters(tours) {
    var types = tours.map(function(t) { return t.type; })
      .filter(function(v, i, a) { return a.indexOf(v) === i; }).sort();
    var container = document.getElementById('filters');
    types.forEach(function(type) {
      var btn = document.createElement('button');
      btn.className = 'ns-filter';
      btn.dataset.type = type;
      btn.textContent = type;
      btn.addEventListener('click', function() { setFilter(type); });
      container.appendChild(btn);
    });
    container.querySelector('[data-type="all"]').addEventListener('click', function() { setFilter('all'); });
  }

  function setFilter(type) {
    activeFilter = type;
    document.querySelectorAll('.ns-filter').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.type === type);
    });
    var filtered = type === 'all' ? allTours : allTours.filter(function(t) { return t.type === type; });
    renderGrid(filtered);
  }

  // ── Grid — skip first 3 (used in hero) ──
  function renderGrid(tours) {
    var skip = activeFilter === 'all' ? 3 : 0;
    var display = tours.slice(skip);
    var count = document.getElementById('toursCount');
    count.textContent = allTours.length + ' tours';

    if (!display.length) {
      document.getElementById('gridContainer').innerHTML = '<div class="ns-state">No tours found.</div>';
      return;
    }

    document.getElementById('gridContainer').innerHTML =
      '<div class="ns-grid">' +
      display.map(function(tour) {
        return [
          '<a class="ns-card" href="' + esc(tour.url) + '" target="_blank" rel="noopener">',
            '<img class="ns-card__img" src="' + esc(tour.image_url) + '" alt="' + esc(tour.title) + '" loading="lazy">',
            '<div class="ns-card__body">',
              '<div class="ns-card__type">' + esc(tour.type) + '</div>',
              tour.availability ? '<div class="ns-card__avail">' + esc(tour.availability) + '</div>' : '',
              '<div class="ns-card__title">' + esc(tour.title) + '</div>',
              '<div class="ns-card__footer">',
                '<div><strong>' + esc(tour.date) + '</strong>Departure</div>',
                '<div><strong>' + esc(tour.duration) + '</strong>Duration</div>',
              '</div>',
            '</div>',
          '</a>'
        ].join('');
      }).join('') +
      '</div>';
  }

  // ── Departing soon — next 90 days ──
  function renderSoon(tours) {
    var now = Date.now();
    var ninety = 90 * 24 * 3600 * 1000;
    var soon = tours.filter(function(t) {
      var d = new Date(t.date);
      var diff = d - now;
      return diff > 0 && diff < ninety;
    });

    if (!soon.length) return;

    document.getElementById('soonHeader').style.display = 'flex';
    document.getElementById('soonContainer').innerHTML = soon.map(function(tour) {
      return [
        '<a class="ns-wide-card" href="' + esc(tour.url) + '" target="_blank" rel="noopener">',
          '<img class="ns-wide-card__img" src="' + esc(tour.image_url) + '" alt="' + esc(tour.title) + '" loading="lazy">',
          '<div class="ns-wide-card__body">',
            '<div>',
              '<div class="ns-wide-card__type">' + esc(tour.type) + '</div>',
              '<div class="ns-wide-card__title">' + esc(tour.title) + '</div>',
              tour.availability ? '<div class="ns-card__avail" style="margin-top:4px">' + esc(tour.availability) + '</div>' : '',
            '</div>',
            '<div class="ns-wide-card__footer">',
              '<div><strong>' + esc(tour.date) + '</strong>Departure</div>',
              '<div><strong>' + esc(tour.duration) + '</strong>Duration</div>',
            '</div>',
          '</div>',
        '</a>'
      ].join('');
    }).join('');
  }

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

})();
</script>

</body>
</html>
